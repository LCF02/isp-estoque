<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/style.css">
    <title>BDNET Cadastro</title>
</head>
<body>
    <main class="container">
        <form id="formCadastro">
            <h1>BDNET CADASTRO</h1>

            <div class="input-box">
                <input id="nome" placeholder="Nome completo" type="text" required>
                <i class='bx bx-user'></i>
            </div>

            <div class="input-box">
                <input id="email" placeholder="Email" type="email" required>
                <i class='bx bx-envelope'></i>
            </div>

            <div class="input-box">
                <input id="senha" placeholder="Senha" type="password" required>
                <i class='bx bx-lock-alt'></i>
            </div>

            <div class="input-box">
                <input id="confirmarSenha" placeholder="Confirmar senha" type="password" required>
                <i class='bx bx-lock'></i>
            </div>

            <button type="submit" class="login">Cadastrar</button>

            <div class="register-link">
                <p>Já tem uma conta? <a href="login.html">Login</a></p>
            </div>
        </form>
    </main>

<script>
document.getElementById("formCadastro").addEventListener("submit", async function(e){
    e.preventDefault();

    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const confirmarSenha = document.getElementById("confirmarSenha").value;

    // valida senha
    if(senha !== confirmarSenha){
        alert("As senhas não coincidem");
        return;
    }

    try{
        const response = await fetch("http://127.0.0.1:8000/cadastro", {
            method: "POST",
            headers:{
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nome: nome,
                email: email,
                senha: senha
            })
        });

        const data = await response.json();

        if(data.msg){
            alert("Cadastro realizado com sucesso!");
            window.location.href = "login.html";
        }else{
            alert(data.erro || "Erro ao cadastrar");
        }

    }catch(error){
        alert("Erro ao conectar com o servidor");
        console.error(error);
    }
});
</script>

</body>
</html>
